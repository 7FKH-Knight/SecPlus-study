{% extends "base.html" %}
{% block title %}Login — Security+ Study{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="auth-logo-icon">🔐</span>
      <h1>Security+ Study</h1>
      <p class="auth-subtitle">SY0-701 Exam Prep</p>
    </div>

    {% if registered %}
    <div class="alert alert-success">Account created! Sign in below.</div>
    {% endif %}

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" autocomplete="on">
      <div class="form-group">
        <label for="identifier">Username or Email</label>
        <input type="text" id="identifier" name="identifier" required autofocus
               autocomplete="username" placeholder="Enter username or email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required
               autocomplete="current-password" placeholder="Enter password">
      </div>
      <div class="form-check">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Keep me signed in</label>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>

    <p class="auth-footer">
      New here? <a href="{{ url_for('auth.register') }}">Create an account</a>
    </p>
  </div>
</div>
{% endblock %}
