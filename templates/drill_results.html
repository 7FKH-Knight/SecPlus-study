{% extends "base.html" %}
{% block title %}Drill Results — Security+ Study{% endblock %}
{% block content %}
<h1>Drill Complete</h1>

<div class="score-banner {% if correct / total >= 0.7 %}pass{% else %}fail{% endif %}">
  <div class="score-big">{{ correct }}/{{ total }}</div>
  <div class="score-label">{{ '%.0f' % (correct / total * 100) if total else 0 }}% Correct</div>
</div>

<div class="action-buttons" style="margin-top:2rem">
  <a class="btn btn-primary" href="/drill/start">New Drill Session</a>
  <a class="btn btn-secondary" href="/exam/start">Start Full Exam</a>
  <a class="btn btn-secondary" href="/">Dashboard</a>
</div>
{% endblock %}
