<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Security+ Study{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <!-- PWA -->
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#7c5cbf">
  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sec+ Study">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
</head>
<body>
  <nav class="navbar">
    <a class="nav-brand" href="/">Security+ SY0-701</a>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/exam/start">Practice Exam</a>
      <a href="/drill/start">Drill Mode</a>
      <a href="/history">History</a>
    </div>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js');
    }
  </script>
</body>
</html>
