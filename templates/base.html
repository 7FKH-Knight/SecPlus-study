<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Security+ Study{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <!-- PWA -->
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#7c5cbf">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sec+ Study">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <!-- CSRF -->
  {% if current_user.is_authenticated %}
  <meta name="csrf-token" content="{{ csrf_token() }}">
  {% endif %}
</head>
<body>
  {% if current_user.is_authenticated %}
  <nav class="navbar">
    <a class="nav-brand" href="/">
      <span class="nav-brand-icon">🔐</span>
      Security+ SY0-701
    </a>
    <div class="nav-links">
      <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint == 'dashboard' }}">Dashboard</a>
      <a href="{{ url_for('exam_start') }}">Practice Exam</a>
      <a href="{{ url_for('drill_start') }}">Drill Mode</a>
      <a href="{{ url_for('history') }}" class="{{ 'active' if request.endpoint == 'history' }}">History</a>
    </div>
    <div class="nav-user">
      <span class="nav-username">{{ current_user.username }}</span>
      <a href="{{ url_for('auth.logout') }}" class="nav-logout">Sign out</a>
    </div>
  </nav>
  {% endif %}
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js');
    }
  </script>
</body>
</html>
